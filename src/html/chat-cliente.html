<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chat D&Z - Atendimento Online</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Sharp"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Poppins", sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }

      .chat-container {
        width: 100%;
        max-width: 400px;
        height: 600px;
        background: white;
        border-radius: 20px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }

      .chat-header {
        background: linear-gradient(135deg, #28a745, #20c997);
        color: white;
        padding: 20px;
        text-align: center;
      }

      .chat-header h2 {
        margin: 0;
        font-weight: 600;
      }

      .chat-header p {
        margin: 5px 0 0 0;
        opacity: 0.9;
        font-size: 14px;
      }

      .chat-messages {
        flex: 1;
        padding: 20px;
        overflow-y: auto;
        background: #f8f9fa;
      }

      .message {
        margin-bottom: 15px;
        display: flex;
        align-items: flex-end;
      }

      .message.user {
        justify-content: flex-end;
      }

      .message-bubble {
        max-width: 80%;
        padding: 12px 16px;
        border-radius: 18px;
        font-size: 14px;
        line-height: 1.4;
      }

      .message.bot .message-bubble {
        background: white;
        border: 1px solid #e9ecef;
        color: #333;
      }

      .message.user .message-bubble {
        background: #28a745;
        color: white;
      }

      .message-time {
        font-size: 11px;
        opacity: 0.7;
        margin: 5px 0 0 0;
      }

      .chat-input-container {
        padding: 20px;
        background: white;
        border-top: 1px solid #e9ecef;
      }

      .welcome-form {
        display: flex;
        flex-direction: column;
        gap: 15px;
      }

      .welcome-form input {
        padding: 12px;
        border: 1px solid #e9ecef;
        border-radius: 10px;
        font-size: 14px;
        transition: border-color 0.3s;
      }

      .welcome-form input:focus {
        outline: none;
        border-color: #28a745;
      }

      .welcome-form button {
        padding: 12px;
        background: #28a745;
        color: white;
        border: none;
        border-radius: 10px;
        font-weight: 500;
        cursor: pointer;
        transition: background 0.3s;
      }

      .welcome-form button:hover {
        background: #218838;
      }

      .chat-input {
        display: none;
        align-items: center;
        gap: 10px;
      }

      .chat-input input {
        flex: 1;
        padding: 12px;
        border: 1px solid #e9ecef;
        border-radius: 25px;
        font-size: 14px;
      }

      .chat-input button {
        background: #28a745;
        color: white;
        border: none;
        border-radius: 50%;
        width: 45px;
        height: 45px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .typing-indicator {
        display: none;
        padding: 12px 16px;
        background: white;
        border-radius: 18px;
        margin-bottom: 15px;
      }

      .typing-dots {
        display: flex;
        gap: 4px;
      }

      .typing-dots span {
        width: 8px;
        height: 8px;
        background: #ccc;
        border-radius: 50%;
        animation: typing 1.4s infinite;
      }

      .typing-dots span:nth-child(2) {
        animation-delay: 0.2s;
      }

      .typing-dots span:nth-child(3) {
        animation-delay: 0.4s;
      }

      @keyframes typing {
        0%,
        60%,
        100% {
          transform: translateY(0);
        }
        30% {
          transform: translateY(-10px);
        }
      }

      .powered-by {
        text-align: center;
        padding: 10px;
        font-size: 12px;
        color: #666;
        background: #f8f9fa;
      }
    </style>
  </head>
  <body>
    <div class="chat-container">
      <div class="chat-header">
        <h2>💬 Chat D&Z</h2>
        <p>Atendimento inteligente online</p>
      </div>

      <div class="chat-messages" id="chatMessages">
        <div class="message bot">
          <div class="message-bubble">
            Olá! 👋 Bem-vindo ao D&Z! <br />
            Sou sua assistente virtual e estou aqui para ajudar. Para começar,
            me conte seu nome e como posso ajudá-lo hoje?
          </div>
        </div>
      </div>

      <div class="chat-input-container">
        <form class="welcome-form" id="welcomeForm">
          <input type="text" id="nome" placeholder="Seu nome" required />
          <input type="email" id="email" placeholder="Seu e-mail" required />
          <input
            type="text"
            id="mensagem"
            placeholder="Como posso ajudar você?"
            required
          />
          <button type="submit">
            <span class="material-symbols-sharp">send</span>
            Iniciar conversa
          </button>
        </form>

        <div class="chat-input" id="chatInput">
          <input
            type="text"
            id="messageInput"
            placeholder="Digite sua mensagem..."
          />
          <button onclick="enviarMensagem()">
            <span class="material-symbols-sharp">send</span>
          </button>
        </div>
      </div>

      <div class="powered-by">🤖 Powered by IA D&Z</div>
    </div>

    <script>
      let conversaId = null;
      let nomeUsuario = "";

      // Inicializar conversa
      document
        .getElementById("welcomeForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();

          const nome = document.getElementById("nome").value;
          const email = document.getElementById("email").value;
          const mensagem = document.getElementById("mensagem").value;

          if (!nome || !email || !mensagem) return;

          try {
            console.log("Enviando para:", "../php/chat-api.php");
            console.log("Dados:", { nome, email, mensagem });

            const response = await fetch("../php/chat-api.php", {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
              },
              body: JSON.stringify({
                action: "start_conversation",
                nome: nome,
                email: email,
                mensagem: mensagem,
              }),
            });

            if (!response.ok) {
              throw new Error(
                `HTTP ${response.status}: ${response.statusText}`,
              );
            }

            const responseText = await response.text();
            console.log("Response raw:", responseText);

            const data = JSON.parse(responseText);
            console.log("Resposta:", data);

            if (data.success) {
              conversaId = data.conversa_id;
              nomeUsuario = nome;

              // Esconder formulário inicial
              document.getElementById("welcomeForm").style.display = "none";
              document.getElementById("chatInput").style.display = "flex";

              // Adicionar primeira mensagem do usuário
              adicionarMensagem(mensagem, "user");

              // Simular resposta da IA
              mostrarTyping();

              setTimeout(() => {
                esconderTyping();
                adicionarMensagem(
                  data.resposta ||
                    `Olá ${nome}! Recebi sua mensagem e vou te ajudar com isso. Em que mais posso auxiliar?`,
                  "bot",
                );
              }, 2000);
            } else {
              alert("Erro ao iniciar conversa: " + data.error);
            }
          } catch (error) {
            console.error("Erro detalhado:", error);
            alert("Erro de conexão: " + error.message);
          }
        });

      // Enviar mensagem
      async function enviarMensagem() {
        const input = document.getElementById("messageInput");
        const mensagem = input.value.trim();

        if (!mensagem) return;

        input.value = "";
        adicionarMensagem(mensagem, "user");

        mostrarTyping();

        try {
          const response = await fetch("../php/chat-api.php", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              action: "send_message",
              conversa_id: conversaId,
              mensagem: mensagem,
            }),
          });

          const data = await response.json();

          esconderTyping();

          if (data.success) {
            adicionarMensagem(data.resposta, "bot");
          } else {
            adicionarMensagem(
              "Desculpe, houve um erro. Tente novamente.",
              "bot",
            );
          }
        } catch (error) {
          esconderTyping();
          adicionarMensagem("Erro de conexão. Verifique sua internet.", "bot");
        }
      }

      // Enter para enviar
      document
        .getElementById("messageInput")
        .addEventListener("keypress", (e) => {
          if (e.key === "Enter") {
            enviarMensagem();
          }
        });

      function adicionarMensagem(texto, tipo) {
        const chatMessages = document.getElementById("chatMessages");
        const messageDiv = document.createElement("div");
        messageDiv.className = `message ${tipo}`;

        messageDiv.innerHTML = `
                <div class="message-bubble">
                    ${texto}
                    <div class="message-time">${new Date().toLocaleTimeString("pt-BR", { hour: "2-digit", minute: "2-digit" })}</div>
                </div>
            `;

        chatMessages.appendChild(messageDiv);
        chatMessages.scrollTop = chatMessages.scrollHeight;
      }

      function mostrarTyping() {
        const chatMessages = document.getElementById("chatMessages");
        const typingDiv = document.createElement("div");
        typingDiv.className = "typing-indicator";
        typingDiv.id = "typing";
        typingDiv.innerHTML = `
                <div class="typing-dots">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            `;
        chatMessages.appendChild(typingDiv);
        chatMessages.scrollTop = chatMessages.scrollHeight;
      }

      function esconderTyping() {
        const typing = document.getElementById("typing");
        if (typing) {
          typing.remove();
        }
      }
    </script>
  </body>
</html>
